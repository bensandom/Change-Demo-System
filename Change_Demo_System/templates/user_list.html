{% extends "base.html" %}

{% block content %}
<h2>All Users</h2>

<a class="btn btn-primary" href="{{ url_for('user_management.add_user') }}">New User</a>

<table class="detail-table">
    <thead>
        <tr>
            <th>Username</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.role }}</td>
            <td>
                <a class = "btn" href="{{ url_for('user_management.view_user', user_id=user.id) }}">View</a>
                <a class = "btn btn-primary" href="{{ url_for('user_management.edit_user', user_id=user.id) }}">Edit</a>
                {% if user.id != current_user.id %}
                    <a class = "btn btn-danger" href="{{ url_for('user_management.delete_user', user_id=user.id) }}" onclick="return confirm('Are you sure you want to delete this user?')">Delete</a>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
