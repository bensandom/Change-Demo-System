{% extends "base.html" %}

{% block content %}
<h2>All Groups</h2>

<a class="btn btn-primary" href="{{ url_for('group_management.add_group') }}">New Group</a>

<table class="detail-table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for group in groups %}
        <tr>
            <td>{{ group.name}}</td>
            <td>
                <a class = "btn" href="{{ url_for('group_management.view_group', group_id=group.id) }}">View</a>
                <a class = "btn btn-primary" href="{{ url_for('group_management.edit_group', group_id=group.id) }}">Edit</a>
                <a class = "btn btn-danger" href="{{ url_for('group_management.delete_group', group_id=group.id) }}" onclick="return confirm('Are you sure you want to delete this group?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
